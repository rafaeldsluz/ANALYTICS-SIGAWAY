<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigaway — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text-1:  #f1f5f9;
      --text-2:  #94a3b8;
      --text-3:  #64748b;
      --green:   #10b981;
      --green-d: #059669;
      --red:     #ef4444;
      --amber:   #f59e0b;
    }
    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 16px;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area svg { margin-bottom: 12px; }
    .logo-area h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo-area p {
      font-size: 13px;
      color: var(--text-3);
      margin-top: 4px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-1);
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: var(--green); }
    .btn-submit {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: var(--green-d); }
    .alert {
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert.error   { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
    .alert.warning { background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.3); color: #fcd34d; }
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--text-3);
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="login-wrap">

  <div class="logo-area">
    <img src="/static/logo.jpg" alt="Sigaway" width="64" height="64" style="border-radius:12px;object-fit:cover;">
    <h1>Sigaway Analytics</h1>
    <p>Plataforma de Automação de Marketing</p>
  </div>

  <div class="card">

    {% if no_password %}
    <div class="alert warning">
      <strong>Aviso de Segurança:</strong> Configure <code>APP_PASSWORD</code> no arquivo <code>.env</code> para ativar o login.
    </div>
    {% endif %}

    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <div class="field">
        <label>Usuário</label>
        <input type="text" name="username" placeholder="admin"
               autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" name="password" placeholder="••••••••"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-submit">Entrar</button>
      <div style="text-align:center;margin-top:14px;">
        <a href="/forgot-password" style="font-size:12px;color:var(--text-3);text-decoration:none;">Esqueceu a senha?</a>
      </div>
    </form>
  </div>

  <div class="footer-note">
    Sigaway Analytics &bull; Acesso restrito
  </div>

</div>
</body>
</html>
