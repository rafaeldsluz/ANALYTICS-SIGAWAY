<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 — Acesso Restrito · Sigaway Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      font-family: 'Inter', sans-serif;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap { text-align: center; padding: 24px; }
    .code { font-size: 72px; font-weight: 700; color: #2a2d3a; line-height: 1; }
    .title { font-size: 20px; font-weight: 600; margin: 12px 0 8px; }
    .desc { font-size: 14px; color: #64748b; margin-bottom: 28px; }
    .btn { display: inline-block; background: #10b981; color: #fff; text-decoration: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; transition: background .15s; }
    .btn:hover { background: #059669; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="code">403</div>
  <div class="title">Acesso Restrito</div>
  <div class="desc">Você não tem permissão para acessar esta área.<br>Entre em contato com o administrador se precisar de acesso.</div>
  <a href="/email" class="btn">Voltar ao início</a>
</div>
</body>
</html>
