<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigaway Analytics — Nova senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text-1:  #f1f5f9;
      --text-2:  #94a3b8;
      --text-3:  #64748b;
      --green:   #10b981;
      --green-d: #059669;
    }
    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .wrap { width: 100%; max-width: 400px; }
    .logo-area { text-align: center; margin-bottom: 28px; }
    .logo-area img { border-radius: 12px; margin-bottom: 12px; }
    .logo-area h1 { font-size: 20px; font-weight: 700; }
    .logo-area p  { font-size: 13px; color: var(--text-3); margin-top: 4px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px 24px; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-1);
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: var(--green); }
    .btn { width: 100%; border: none; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 4px; transition: background .15s; background: var(--green); color: #fff; }
    .btn:hover { background: var(--green-d); }
    .alert { border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
    .alert.error   { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
    .alert.success { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.3); color: #6ee7b7; }
    .success-icon  { font-size: 40px; text-align: center; margin-bottom: 12px; }
    .footer-note { text-align: center; font-size: 12px; color: var(--text-3); margin-top: 20px; }
    .footer-note a { color: var(--text-2); text-decoration: none; }
    .footer-note a:hover { color: var(--green); }
    .pwd-strength { height: 3px; border-radius: 2px; margin-top: 6px; background: var(--border); }
    .pwd-strength-bar { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="logo-area">
    <img src="/static/logo.jpg" alt="Sigaway" width="56" height="56">
    <h1>Sigaway Analytics</h1>
    <p>Nova senha</p>
  </div>

  <div class="card">
    {% if success %}
      <div class="success-icon">✅</div>
      <div class="alert success">
        <strong>Senha redefinida com sucesso!</strong><br>
        Você já pode fazer login com sua nova senha.
      </div>
      <a href="/login" style="display:block;text-align:center;color:var(--text-2);font-size:13px;margin-top:8px;text-decoration:none;">
        Ir para o login →
      </a>
    {% elif not token %}
      <div class="alert error">{{ error }}</div>
      <a href="/forgot-password" style="display:block;text-align:center;color:var(--text-2);font-size:13px;margin-top:8px;text-decoration:none;">
        Solicitar novo link
      </a>
    {% else %}
      {% if error %}
      <div class="alert error">{{ error }}</div>
      {% endif %}

      <div class="card-title">Criar nova senha</div>

      <form method="POST" action="/reset-password/{{ token }}" id="reset-form">
        <div class="field">
          <label>Nova senha</label>
          <input type="password" name="password" id="f-password"
                 placeholder="Mínimo 8 caracteres"
                 autocomplete="new-password" minlength="8" required autofocus>
          <div class="pwd-strength"><div class="pwd-strength-bar" id="pwd-bar"></div></div>
        </div>
        <div class="field">
          <label>Confirmar nova senha</label>
          <input type="password" name="confirm" id="f-confirm"
                 placeholder="Repita a senha"
                 autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn">Salvar nova senha</button>
      </form>
    {% endif %}
  </div>

  <div class="footer-note">
    <a href="/login">← Voltar ao login</a>
  </div>

</div>
<script>
const pwd = document.getElementById('f-password');
const bar = document.getElementById('pwd-bar');
if (pwd) {
  pwd.addEventListener('input', function () {
    const v = this.value;
    let score = 0;
    if (v.length >= 8)  score++;
    if (v.length >= 12) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const colors = ['#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'];
    const widths  = ['20%','40%','60%','80%','100%'];
    bar.style.width      = score ? widths[score-1] : '0';
    bar.style.background = score ? colors[score-1] : 'transparent';
  });
}
document.getElementById('reset-form')?.addEventListener('submit', function(e) {
  const p = document.getElementById('f-password').value;
  const c = document.getElementById('f-confirm').value;
  if (p !== c) { e.preventDefault(); alert('As senhas não coincidem.'); }
});
</script>
</body>
</html>
